<script src="data/posts.js"></script>
<script>
function render() {
  const projectContainer = document.getElementById("project-list");
  const noteContainer = document.getElementById("note-list");

  posts.sort((a, b) => new Date(b.date) - new Date(a.date));

  posts.forEach(p => {
    const el = document.createElement("div");
    el.className = "item";

    el.innerHTML = `
      <div class="item-row">
        <div class="item-date">${p.date}</div>
        <div class="item-title">
          <a href="${p.path}" target="_blank">${p.title}</a>
        </div>
      </div>
      ${p.desc ? `<div class="item-desc">${p.desc}</div>` : ""}
    `;

    if (p.category === "project") {
      projectContainer.appendChild(el);
    } else {
      noteContainer.appendChild(el);
    }
  });
}

document.addEventListener("DOMContentLoaded", render);

</script>
